name: main
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    name: build and deploy to prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: install
        run: yarn
      - name: check types
        run: yarn types
      - name: setup emsdk and build
        run: cd emsdk && ./emsdk install 3.1.54 && ./emsdk activate 3.1.54 && source ./emsdk_env.sh && cd .. && yarn build
      - name: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CARBON_DOMINION_415509 }}'
          channelId: live
          projectId: carbon-dominion-415509

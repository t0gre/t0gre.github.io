name: Run tests
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  ts_tests:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: yarn && yarn build
      